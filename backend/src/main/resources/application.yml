spring:
  application:
    name: ketangpai-classroom

  profiles:
    active: dev

---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/${DB_NAME:ketangpai}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false

  # MinIO 对象存储
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:ketangpai}

  # Spring AI 2.0 配置 — Chat / Embedding 分离，其余禁用
  ai:
    model:
      image: none
      audio: none
      moderation: none

    openai:
      api-key: ${OPENAI_CHAT_API_KEY:}   # 公共 fallback（未使用的模块依赖此值）
      chat:
        api-key: ${OPENAI_CHAT_API_KEY:}
        base-url: ${OPENAI_CHAT_BASE_URL:}
        model: ${OPENAI_CHAT_MODEL:deepseek-v4-flash}
      embedding:
        api-key: ${OPENAI_EMBEDDING_API_KEY:}
        base-url: ${OPENAI_EMBEDDING_BASE_URL:}
        model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v4}

    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:localhost}
        port: ${QDRANT_PORT:6334}
        collection-name: ${QDRANT_COLLECTION:ketangpai-kb}
        initialize-schema: true

# JWT 配置
jwt:
  secret: ${JWT_SECRET:ketangpai-jwt-secret-key-2026-must-be-at-least-256-bits-long}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 小时 (毫秒)

# 服务端口
server:
  port: ${SERVER_PORT:8080}
