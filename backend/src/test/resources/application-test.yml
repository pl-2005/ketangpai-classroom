spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  # MinIO 测试配置（MinioClient 需要 non-null endpoint，但测试中不真正使用）
  minio:
    endpoint: http://localhost:9000
    access-key: test
    secret-key: test12345678
    bucket: test-bucket

  # 排除需要外部服务的自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # 禁用定时任务
  task:
    scheduling:
      enabled: false

  # 禁用 Spring AI
  ai:
    model:
      image: none
      audio: none
      moderation: none
    openai:
      api-key: test
      chat:
        api-key: test
      embedding:
        api-key: test
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        initialize-schema: false

# JWT
jwt:
  secret: test-secret-key-for-integration-testing-256-bits-long!!
  expiration: 3600000
  issuer: test
  audience: test

# bcrypt 强度降低
security:
  bcrypt:
    strength: 4
  login:
    max-attempts-per-identity: 100
    max-attempts-per-ip: 1000
    window-millis: 900000

server:
  port: 0
